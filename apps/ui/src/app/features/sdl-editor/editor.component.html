<div class="editor-root">
  <div class="page-header">
    <h1 class="page-title">SDL Editor</h1>
    <div class="flex gap-2">
      <span class="badge badge-primary">FIBO-v3.2.1</span>
      <button class="btn btn-primary">Save & Compile</button>
    </div>
  </div>

  <div class="editor-layout">
    <!-- Left: Monaco YAML editor -->
    <div class="editor-panel card">
      <div class="panel-header">
        <span class="text-xs text-muted font-semibold">SDL Source (YAML)</span>
        <span class="badge badge-neutral font-mono">risk.sdl.yaml</span>
      </div>
      <textarea
        class="sdl-monaco-editor"
        [ngModel]="sdlSource()"
        (ngModelChange)="onSdlChange($event)"
        spellcheck="false"
        autocomplete="off"
      ></textarea>
    </div>

    <!-- Right: Preview tabs -->
    <div class="preview-panel card">
      <div class="panel-header">
        <span class="text-xs text-muted font-semibold">Compiled Output</span>
      </div>
      <div class="tab-bar">
        @for (tab of previewTabs; track tab) {
          <button class="tab" [class.active]="activePreviewTab() === tab" (click)="activePreviewTab.set(tab)">
            {{ tab | uppercase }}
          </button>
        }
      </div>
      <pre class="code-block preview-code">{{ getPreview() }}</pre>
    </div>
  </div>
</div>
