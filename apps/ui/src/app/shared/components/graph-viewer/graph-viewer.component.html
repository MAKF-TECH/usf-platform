<div class="gv-root">
  <div class="gv-controls">
    <div class="ctrl card p-3">
      <label class="ctrl-label">Search</label>
      <input class="input w-full" placeholder="Label or IRI..." [value]="searchQuery()" (input)="searchQuery.set($any($event.target).value)"/>
      <span class="text-xs text-muted">{{ filteredNodes().length }}/{{ nodes().length }}</span>
    </div>
    <div class="ctrl card p-3">
      <label class="ctrl-label">Layout</label>
      @for (l of layouts; track l) {
        <button class="btn btn-ghost" style="width:100%;justify-content:flex-start" [class.active]="layout()===l" (click)="layout.set(l)">{{ l | titlecase }}</button>
      }
    </div>
    <div class="ctrl card p-3">
      <label class="ctrl-label">Display</label>
      <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--usf-text-secondary);cursor:pointer">
        <input type="checkbox" [checked]="showLabels()" (change)="showLabels.set($any($event.target).checked)"/> Labels
      </label>
      <div><span class="text-xs text-muted">Max nodes</span>
        <input type="range" min="50" max="500" step="50" style="width:100%;accent-color:var(--usf-primary-500)" [value]="maxNodes()" (input)="maxNodes.set(+$any($event.target).value)"/>
        <span class="text-xs">{{ maxNodes() }}</span>
      </div>
    </div>
  </div>
  <div class="gv-canvas card">
    <div echarts [options]="chartOption()" (chartClick)="onChartClick($event)" style="width:100%;height:100%;min-height:400px"></div>
  </div>
</div>
