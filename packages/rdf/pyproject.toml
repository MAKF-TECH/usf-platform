[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "usf-rdf"
version = "0.1.0"
description = "Shared RDF/SPARQL/SHACL utilities for USF"
requires-python = ">=3.12"
dependencies = [
    "rdflib>=7.0",
    "pyshacl>=0.25",
    "owlrl>=6.0",
    "pyoxigraph>=0.3",
    "SPARQLWrapper>=2.0",
    "httpx>=0.27",
    "loguru>=0.7",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-asyncio>=0.23"]

[tool.hatch.build.targets.wheel]
packages = ["usf_rdf"]
