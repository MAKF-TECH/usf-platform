# USF Banking Pilot SDL
# FIBO-aligned entity definitions for Account, Bank (CommercialBank), Transaction
# Plus a total_exposure metric
#
# SDL (Semantic Definition Language) is USF's YAML-based schema language.
# Compile with: POST /compile → {owl_turtle, sql_by_dialect, r2rml, prov_template}

version: "1.0"
namespace: "https://usf.makf.tech/tenant/pilot-bank/"
ontology_module: fibo
contexts:
  - id: risk
    description: "Risk management team — exposure, counterparty risk"
  - id: finance
    description: "Finance team — P&L, balances, regulatory reporting"
  - id: aml
    description: "AML compliance — suspicious activity, transaction monitoring"

entities:
  - name: Account
    description: "A financial account held by a legal entity"
    fibo_class: "https://spec.edmcouncil.org/fibo/ontology/FBC/ProductsAndServices/FinancialProductsAndServices/Account"
    fields:
      - name: accountId
        type: string
        required: true
        description: "Internal account identifier"
        fibo_property: "https://usf.makf.tech/ontology/accountId"
      - name: accountType
        type: string
        required: true
        enum: [checking, savings, loan, credit, investment]
        fibo_property: "https://usf.makf.tech/ontology/accountType"
      - name: heldBy
        type: ref(Bank)
        required: true
        description: "Legal entity holding this account"
        fibo_property: "https://usf.makf.tech/ontology/heldBy"
      - name: currency
        type: string
        pattern: "^[A-Z]{3}$"
        description: "ISO 4217 currency code"
        fibo_property: "https://usf.makf.tech/ontology/currency"
      - name: balance
        type: decimal
        description: "Current balance"
        fibo_property: "https://usf.makf.tech/ontology/balance"
        context_visibility:
          - context: risk
            clearance: internal
          - context: finance
            clearance: internal
      - name: status
        type: string
        enum: [active, inactive, frozen, closed]
        fibo_property: "https://usf.makf.tech/ontology/accountStatus"

  - name: Bank
    description: "A commercial bank (legal entity)"
    fibo_class: "https://spec.edmcouncil.org/fibo/ontology/FBC/FunctionalEntities/FinancialInstitutions/CommercialBank"
    fields:
      - name: legalName
        type: string
        required: true
        fibo_property: "https://usf.makf.tech/ontology/legalName"
      - name: lei
        type: string
        pattern: "^[A-Z0-9]{20}$"
        description: "ISO 17442 LEI"
        fibo_property: "https://usf.makf.tech/ontology/lei"
      - name: bic
        type: string
        pattern: "^[A-Z]{6}[A-Z0-9]{2}([A-Z0-9]{3})?$"
        description: "BIC/SWIFT code"
        fibo_property: "https://usf.makf.tech/ontology/bic"
      - name: jurisdiction
        type: string
        pattern: "^[A-Z]{2}$"
        description: "ISO 3166-1 alpha-2 country code"
        fibo_property: "https://usf.makf.tech/ontology/jurisdiction"
      - name: sector
        type: string
        enum: [retail, investment, central, cooperative, islamic, development]
        fibo_property: "https://usf.makf.tech/ontology/sector"

  - name: Transaction
    description: "A financial transaction between two accounts"
    fibo_class: "https://usf.makf.tech/ontology/FinancialTransaction"
    fields:
      - name: transactionId
        type: string
        required: true
        fibo_property: "https://usf.makf.tech/ontology/transactionId"
      - name: amount
        type: decimal
        required: true
        fibo_property: "https://usf.makf.tech/ontology/amount"
      - name: currency
        type: string
        required: true
        pattern: "^[A-Z]{3}$"
        fibo_property: "https://usf.makf.tech/ontology/currency"
      - name: timestamp
        type: datetime
        required: true
        fibo_property: "https://usf.makf.tech/ontology/timestamp"
      - name: fromAccount
        type: ref(Account)
        required: true
        fibo_property: "https://usf.makf.tech/ontology/fromAccount"
      - name: toAccount
        type: ref(Account)
        required: true
        fibo_property: "https://usf.makf.tech/ontology/toAccount"
      - name: transactionType
        type: string
        enum: [wire, ach, swift, sepa, cash, internal, check]
        fibo_property: "https://usf.makf.tech/ontology/transactionType"
      - name: isFlagged
        type: boolean
        description: "AML flag"
        fibo_property: "https://usf.makf.tech/ontology/isFlagged"
        context_visibility:
          - context: aml
            clearance: restricted

metrics:
  - name: total_exposure
    description: "Total outstanding exposure per counterparty bank"
    entity: Account
    aggregation: SUM
    field: balance
    group_by:
      - heldBy.legalName
      - heldBy.jurisdiction
    filters:
      - field: status
        operator: "="
        value: active
      - field: heldBy.sector
        operator: IN
        value: [retail, investment]
    contexts: [risk, finance]
    sql_hint:
      snowflake: |
        SELECT b.legal_name, b.jurisdiction, SUM(a.balance) AS total_exposure
        FROM account a JOIN bank b ON a.held_by = b.id
        WHERE a.status = 'active' AND b.sector IN ('retail','investment')
        GROUP BY b.legal_name, b.jurisdiction
        ORDER BY total_exposure DESC

  # BankAccount — alias for Account, emphasises the FIBO-FBC class
  - name: BankAccount
    description: "A bank account held at a commercial bank (FIBO-FBC-PS Account)"
    fibo_class: "https://spec.edmcouncil.org/fibo/ontology/FBC/ProductsAndServices/FinancialProductsAndServices/Account"
    alias_of: Account
    fibo_prefix: "fibo-fbc-ps"
    fields:
      - name: accountId
        type: string
        required: true
        fibo_property: "https://usf.makf.tech/ontology/accountId"
      - name: balance
        type: decimal
        description: "Current account balance"
        fibo_property: "https://usf.makf.tech/ontology/balance"
        context_visibility:
          - context: risk
            clearance: internal
            description: "Risk view: balance used for exposure calculations"
          - context: finance
            clearance: internal
            description: "Finance view: balance used for P&L reporting"

  # CommercialBank — explicit alias referencing the fibo-be-le Legal Entity
  - name: CommercialBank
    description: "A commercial bank as a Legal Entity (fibo-be-le)"
    fibo_class: "https://spec.edmcouncil.org/fibo/ontology/BE/LegalEntities/LegalPersons/LegalEntity"
    fibo_prefix: "fibo-be-le"
    also_a:
      - "https://spec.edmcouncil.org/fibo/ontology/FBC/FunctionalEntities/FinancialInstitutions/CommercialBank"
    fields:
      - name: legalName
        type: string
        required: true
        fibo_property: "https://usf.makf.tech/ontology/legalName"
      - name: lei
        type: string
        pattern: "^[A-Z0-9]{20}$"
        fibo_property: "https://usf.makf.tech/ontology/lei"
      - name: jurisdiction
        type: string
        pattern: "^[A-Z]{2}$"
        fibo_property: "https://usf.makf.tech/ontology/jurisdiction"

  # FinancialTransaction — maps to FIBO monetary transaction
  - name: FinancialTransaction
    description: "A financial transaction between two parties (FIBO)"
    fibo_class: "https://spec.edmcouncil.org/fibo/ontology/FND/Transactions/REATransactions/Transaction"
    fibo_prefix: "fibo-fnd-txn"
    fields:
      - name: transactionId
        type: string
        required: true
        fibo_property: "https://usf.makf.tech/ontology/transactionId"
      - name: amount
        type: decimal
        required: true
        description: "Transaction amount"
        fibo_property: "https://spec.edmcouncil.org/fibo/ontology/FND/Accounting/AccountingEquity/hasMonetaryAmount"
        fibo_shortname: "fibo:hasMonetaryAmount"
      - name: currency
        type: string
        required: true
        pattern: "^[A-Z]{3}$"
        fibo_property: "https://usf.makf.tech/ontology/currency"
      - name: fromBank
        type: ref(CommercialBank)
        fibo_property: "https://usf.makf.tech/ontology/fromBank"
      - name: toBank
        type: ref(CommercialBank)
        fibo_property: "https://usf.makf.tech/ontology/toBank"
      - name: fromAccount
        type: ref(BankAccount)
        fibo_property: "https://usf.makf.tech/ontology/fromAccount"
      - name: toAccount
        type: ref(BankAccount)
        fibo_property: "https://usf.makf.tech/ontology/toAccount"
      - name: isSuspicious
        type: boolean
        description: "AML suspicious activity flag"
        fibo_property: "https://usf.makf.tech/ontology/isSuspicious"
        context_visibility:
          - context: aml
            clearance: restricted

# ── Additional metrics ─────────────────────────────────────────────────────────

  # total_exposure_by_counterparty: same metric, 2 context filters → triggers 409 when no context
  - name: total_exposure_by_counterparty
    description: >
      Total financial exposure grouped by counterparty bank.
      Exists in BOTH risk and finance contexts with different filters —
      querying without context triggers 409 disambiguation.
    entity: FinancialTransaction
    aggregation: SUM
    field: amount
    group_by:
      - fromBank.legalName
      - fromBank.jurisdiction
    context_definitions:
      - context: risk
        description: "Risk view: all active counterparties, exposure threshold monitoring"
        filters:
          - field: fromBank.sector
            operator: IN
            value: [retail, investment, islamic]
          - field: amount
            operator: ">"
            value: 0
        access_policy: risk_analyst
      - context: finance
        description: "Finance view: only settled transactions for P&L"
        filters:
          - field: currency
            operator: "="
            value: EUR
          - field: isSuspicious
            operator: "="
            value: false
        access_policy: finance_analyst
    sql_hint:
      postgres: |
        -- RISK context
        SELECT from_bank, SUM(amount) AS total_exposure, COUNT(*) AS txn_count
        FROM staging_fibo_banking.aml_transactions
        GROUP BY from_bank
        ORDER BY total_exposure DESC;

  # balance: 2 contexts → triggers 409 disambiguation demo
  - name: balance
    description: >
      Account balance metric. Defined in both risk and finance contexts.
      Querying without ?context triggers 409 with available contexts listed.
    entity: BankAccount
    aggregation: LATEST
    field: balance
    context_definitions:
      - context: risk
        description: "Risk context: balance for counterparty exposure assessment"
        filters:
          - field: status
            operator: IN
            value: [active, frozen]
        access_policy: risk_analyst
      - context: finance
        description: "Finance context: balance for P&L and regulatory reporting"
        filters:
          - field: status
            operator: "="
            value: active
          - field: accountType
            operator: IN
            value: [checking, savings, loan]
        access_policy: finance_analyst

# ── Access policies ────────────────────────────────────────────────────────────

access_policies:
  - name: risk_analyst
    description: "Risk management team — read access to risk context metrics"
    roles: [risk_analyst, risk_manager, aml_officer]
    permissions:
      - action: read
        context: risk
        entities: [BankAccount, CommercialBank, FinancialTransaction]
        metrics: [total_exposure_by_counterparty, balance]
      - action: read
        context: aml
        entities: [FinancialTransaction]
        fields: [isSuspicious]

  - name: finance_analyst
    description: "Finance team — read access to finance context metrics"
    roles: [finance_analyst, finance_manager, controller]
    permissions:
      - action: read
        context: finance
        entities: [BankAccount, CommercialBank, FinancialTransaction]
        metrics: [total_exposure_by_counterparty, balance]

  - name: aml_compliance
    description: "AML compliance officers — read access to AML context"
    roles: [aml_officer, compliance_manager, auditor]
    permissions:
      - action: read
        context: aml
        entities: [FinancialTransaction]
        fields: [isSuspicious, transactionId, amount, currency, fromBank, toBank]

