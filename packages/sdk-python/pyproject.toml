[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "usf-sdk"
version = "0.1.0"
description = "Universal Semantic Fabric — Python SDK"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.27",
    "pydantic>=2.7",
    "loguru>=0.7",
]

[project.optional-dependencies]
dev = ["pytest>=8", "pytest-asyncio>=0.23", "respx>=0.21"]

[tool.hatch.build.targets.wheel]
packages = ["usf_sdk"]
