[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "usf-core"
version = "0.1.0"
description = "Shared core utilities for USF services"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.7",
    "loguru>=0.7",
    "httpx>=0.27",
]

[tool.hatch.build.targets.wheel]
packages = ["usf_core"]
