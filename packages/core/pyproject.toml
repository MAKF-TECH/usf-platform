[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "usf-core"
version = "0.1.0"
description = "Shared USF core library: config, logging, auth, errors, GitHub App helper"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
authors = [
    {name = "MAKF Tech", email = "dev@makf.tech"}
]

dependencies = [
    "pydantic>=2.7",
    "pydantic-settings>=2.3",
    "loguru>=0.7",
    "python-jose[cryptography]>=3.3",
    "passlib[bcrypt]>=1.7",
    "PyJWT>=2.8",
    "cryptography>=42.0",
    "httpx>=0.27",
    "tenacity>=8.3",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "ruff>=0.4",
    "mypy>=1.10",
]

[tool.hatch.build.targets.wheel]
packages = ["usf_core"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.mypy]
python_version = "3.11"
strict = true
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
